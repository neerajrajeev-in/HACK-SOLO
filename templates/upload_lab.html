<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SOLO / FILE UPLOAD LAB</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #00ff00;
    font-family: "Courier New", monospace;
}

/* Top header */
.header {
    text-align: center;
    padding: 20px;
    border-bottom: 1px solid #00ff00;
}

.header h1 {
    margin: 0;
    font-size: 28px;
    letter-spacing: 2px;
    text-shadow: 0 0 10px #00ff00;
}

.header p {
    font-size: 12px;
    opacity: 0.7;
}

/* Main box */
.container {
    width: 60%;
    margin: 50px auto;
    padding: 20px;
    border: 1px solid #00ff00;
    box-shadow: 0 0 20px #00ff00;
}

/* Form */
input[type="file"] {
    background: #000;
    border: 1px solid #00ff00;
    color: #00ff00;
    padding: 10px;
    width: 100%;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    background: black;
    color: #00ff00;
    border: 1px solid #00ff00;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00ff00;
    color: #000;
}

/* Output */
.output {
    margin-top: 20px;
    padding: 10px;
    border-top: 1px dashed #00ff00;
    font-size: 14px;
    min-height: 40px;
}

/* Blinking cursor effect */
.cursor {
    display: inline-block;
    width: 10px;
    background: #00ff00;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}
</style>
</head>

<body>

<div class="header">
    <h1>SOLO FILE UPLOAD LAB</h1>
    <p>SECURE TERMINAL INTERFACE v1.0</p>
</div>

<div class="container">

    <form method="POST" enctype="multipart/form-data">
        <label>SELECT FILE TO UPLOAD:</label><br><br>
        <input type="file" name="file"><br><br>

        <button type="submit">EXECUTE UPLOAD</button>
    </form>

    <div class="output">
        <p>> SYSTEM OUTPUT:</p>
        <p>{{ message }}<span class="cursor"></span></p>
    </div>

</div>

</body>
</html>
